# Modern Docker Compose syntax (no version needed for Docker Compose 2.x+)

services:
  # PostgreSQL database
  # DB_PASSWORD is read from backend/.env and mapped to POSTGRES_PASSWORD at container startup
  db:
    image: postgres:15
    container_name: cv_tailor_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: cv_tailor
      POSTGRES_USER: cv_tailor_user
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    entrypoint: ["sh", "-c", "export POSTGRES_PASSWORD=\"$$DB_PASSWORD\" && exec docker-entrypoint.sh postgres"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db_init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv_tailor_user -d cv_tailor"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cv_tailor_network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: cv_tailor_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - cv_tailor_network

  # Backend Django application
  backend:
    build: ./backend
    container_name: cv-tailor-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,cv-tailor-backend
    volumes:
      - ./backend:/app
      - /app/.venv  # Exclude host's .venv, use container's .venv
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cv_tailor_network
    command: >
      bash -c "
        uv run --frozen python manage.py migrate &&
        uv run --frozen python manage.py create_dev_superuser &&
        uv run --frozen python manage.py collectstatic --noinput &&
        uv run --frozen python manage.py runserver 0.0.0.0:8000
      "

  # Celery worker for background tasks
  celery:
    build: ./backend
    container_name: cv_tailor_celery
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/.venv  # Exclude host's .venv, use container's .venv
    networks:
      - cv_tailor_network
    command: uv run --frozen celery -A cv_tailor worker -l info

  # Frontend React application
  frontend:
    build: ./frontend
    container_name: cv_tailor_frontend
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - DOCKER_ENV=true
    networks:
      - cv_tailor_network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:

networks:
  cv_tailor_network:
    driver: bridge